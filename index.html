    <!-- Gallery -->
    <!--
      HOW TO ADD / EDIT PAINTINGS:
      ─────────────────────────────────────────────────────────────
      1. Drop your image file into the /images/ folder.
      2. Copy any gallery-item block below and paste it inside .gallery.
      3. Fill in the details inside .item-info:
         - .item-title  → painting name
         - .item-meta   → size (e.g. "18 × 24 in · Acrylic")
         - .item-price  → price (e.g. "$350") OR add class "sold" for sold works
      4. Leave any field blank and it simply won't appear.
      ─────────────────────────────────────────────────────────────
    -->
    <div class="gallery">

      <!-- ↓ EXAMPLE: fully filled in -->
      <div class="gallery-item">
        <img src="images/20240307-Portfolio-0001.jpeg" alt="Painting by Jen Strasburger" loading="lazy" />
        <div class="item-info">
          <span class="item-title">Untitled No. 1</span>
          <span class="item-meta">24 × 36 in · Acrylic on canvas</span>
          <span class="item-price">$450</span>
        </div>
      </div>

  <!-- Lightbox -->
  <div class="lightbox" role="dialog" aria-modal="true" aria-label="Painting viewer">
    <button class="lightbox-close" aria-label="Close">Close ✕</button>
    <button class="lightbox-prev" aria-label="Previous painting">

    </button>

    </div>
    <button class="lightbox-next" aria-label="Next painting">

    </button>
    <div class="lightbox-caption">
